version: "3.1"
intents:
  - saludar
  - preguntar_que_es_laudato_si
  - preguntar_temas_laudato_si
  - preguntar_acciones_laudato_si
  - despedirse

responses:
  utter_saludar:
    - text: "¡Hola! Soy Laudato Si’ Bot. ¿En qué puedo ayudarte hoy sobre la encíclica o el cuidado de la Casa Común?"

  utter_que_es_laudato_si:
    - text: "La Laudato Si’ es una encíclica del Papa Francisco publicada en 2015, que aborda el cuidado de la Casa Común y la ecología integral."

  utter_temas_laudato_si:
    - text: "Los temas principales de la Laudato Si’ incluyen la ecología integral, la crítica al consumismo, la justicia social, y la llamada a una conversión ecológica."

  utter_acciones_laudato_si:
    - text: "Puedes empezar reduciendo tu consumo de plástico, ahorrando energía, y participando en iniciativas de reciclaje o huertos comunitarios."

  utter_despedirse:
    - text: "¡Que Dios te bendiga! Recuerda: el cuidado de la Creación es responsabilidad de todos. ¡Hasta pronto!"